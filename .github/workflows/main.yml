name: Deploy To CloudPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: boardpefocus-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Test SSH connection
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 13.127.64.109
          username: boardpefocusdb
          password: ${{ secrets.CLOUDPANEL_PASSWORD }}
          port: 22
          script_stop: true
          command_timeout: 5m
          script: |
            whoami
            pwd

      - name: Deploy to CloudPanel server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 13.127.64.109
          username: boardpefocusdb
          password: ${{ secrets.CLOUDPANEL_PASSWORD }}
          port: 22
          script_stop: true
          command_timeout: 40m
          script: |
            set -e

            APP_DIR="/home/boardpefocus/htdocs/www.boardpefocus.in"

            echo "Connected as: $(whoami)"
            echo "Using app dir: $APP_DIR"

            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            git config --global --add safe.directory "$APP_DIR"

            if [ ! -d ".git" ]; then
              git clone https://github.com/santoshnxtutors/BoardPeFocus.git .
            fi

            git fetch origin main
            git reset --hard origin/main

            if ! command -v pnpm >/dev/null 2>&1; then
              corepack enable
              corepack prepare pnpm@9.5.0 --activate
            fi

            if ! command -v pm2 >/dev/null 2>&1; then
              npm install -g pm2
            fi

            chmod +x scripts/cloudpanel-deploy.sh
            APP_DIR="$APP_DIR" bash scripts/cloudpanel-deploy.sh
