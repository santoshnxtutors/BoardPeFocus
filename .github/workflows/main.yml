name: Deploy To CloudPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: boardpefocus-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to CloudPanel server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.CLOUDPANEL_HOST }}
          username: ${{ secrets.CLOUDPANEL_USER }}
          password: ${{ secrets.CLOUDPANEL_PASSWORD }}
          port: 22
          script_stop: true
          command_timeout: 40m
          script: |
            set -e

            APP_DIR="/home/boardpefocus/htdocs/www.boardpefocus.in"
            REPO_URL="https://github.com/santoshnxtutors/BoardPeFocus.git"
            NODE_VERSION="20"

            echo "Connected as: $(whoami)"
            echo "Using app dir: $APP_DIR"

            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            git config --global --add safe.directory "$APP_DIR"

            if [ ! -d ".git" ]; then
              git clone "$REPO_URL" .
            fi

            git fetch origin main
            git reset --hard origin/main

            export NVM_DIR="$HOME/.nvm"

            if [ ! -d "$NVM_DIR" ]; then
              echo "Installing nvm..."
              curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash
            fi

            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            if ! command -v node >/dev/null 2>&1; then
              echo "Installing Node.js..."
              nvm install $NODE_VERSION
            fi

            nvm use $NODE_VERSION

            node -v

            if ! command -v pnpm >/dev/null 2>&1; then
              corepack enable
              corepack prepare pnpm@9.5.0 --activate
            fi

            pnpm -v

            chmod +x scripts/cloudpanel-deploy.sh
            APP_DIR="$APP_DIR" bash scripts/cloudpanel-deploy.sh
