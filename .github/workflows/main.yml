name: Deploy Frontend To CloudPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: boardpefocus-frontend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy frontend to CloudPanel
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 13.127.64.109
          username: boardpefocusapp
          password: ${{ secrets.CLOUDPANEL_PASSWORD }}
          port: 22
          script_stop: true
          command_timeout: 40m
          script: |
            set -e

            APP_DIR="/home/boardpefocus/htdocs/www.boardpefocus.in"
            REPO_URL="https://github.com/santoshnxtutors/BoardPeFocus.git"
            NODE_VERSION="20"

            echo "Connected as: $(whoami)"
            echo "Using app dir: $APP_DIR"

            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            git config --global --add safe.directory "$APP_DIR"

            if [ ! -d ".git" ]; then
              git clone "$REPO_URL" .
            fi

            git fetch origin main
            git reset --hard origin/main

            export NVM_DIR="$HOME/.nvm"

            if [ ! -d "$NVM_DIR" ]; then
              curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash
            fi

            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            if ! command -v node >/dev/null 2>&1; then
              nvm install $NODE_VERSION
            fi

            nvm use $NODE_VERSION

            if ! command -v pnpm >/dev/null 2>&1; then
              corepack enable
              corepack prepare pnpm@9.5.0 --activate
            fi

            if ! command -v pm2 >/dev/null 2>&1; then
              npm install -g pm2
            fi

            pnpm install --frozen-lockfile
            pnpm --dir apps/frontend build

            if pm2 describe boardpefocus-frontend >/dev/null 2>&1; then
              pm2 restart boardpefocus-frontend
            else
              pm2 start "pnpm start:frontend" --name boardpefocus-frontend
            fi

            pm2 save
