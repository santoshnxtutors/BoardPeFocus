name: Deploy To CloudPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: boardpefocus-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Test SSH connection
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 13.127.64.109
          username: boardpefocusdb
          password: ${{ secrets.CLOUDPANEL_PASSWORD }}
          port: 22
          script_stop: true
          command_timeout: 5m
          script: |
            whoami
            pwd

      - name: Deploy to CloudPanel server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 13.127.64.109
          username: boardpefocusdb
          password: ${{ secrets.CLOUDPANEL_PASSWORD }}
          port: 22
          script_stop: true
          command_timeout: 40m
          script: |
            set -e

            APP_DIR="/home/boardpefocus/htdocs/www.boardpefocus.in"

            echo "Connected as: $(whoami)"
            echo "Using app dir: $APP_DIR"

            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            git config --global --add safe.directory "$APP_DIR"

            if [ ! -d ".git" ]; then
              git clone https://github.com/santoshnxtutors/BoardPeFocus.git .
            fi

            git fetch origin main
            git reset --hard origin/main

            # Ensure Node.js is available on the server. On fresh CloudPanel
            # deployments the site user doesn't have Node installed by default.
            # Use nvm to install an LTS release when `node` is missing. This avoids
            # exiting early and allows the deployment to continue.
            if ! command -v node >/dev/null 2>&1; then
              echo "Node.js is not installed on the server, installing via nvm..."
              export NVM_DIR="$HOME/.nvm"
              # Install nvm if it's not present
              if [ ! -d "$NVM_DIR" ]; then
                curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash
              fi
              # Load nvm into the current shell session
              [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
              # Install and use the LTS version of Node (change the version as required)
              nvm install --lts
              nvm use --lts
            fi

            if ! command -v pnpm >/dev/null 2>&1; then
              corepack enable
              corepack prepare pnpm@9.5.0 --activate
            fi

            chmod +x scripts/cloudpanel-deploy.sh
            APP_DIR="$APP_DIR" bash scripts/cloudpanel-deploy.sh
